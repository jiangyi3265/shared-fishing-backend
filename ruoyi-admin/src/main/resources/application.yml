# 项目相关配置
ruoyi:
  # 名称
  name: 管理系统
  # 版本
  version: 3.9.1
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 应用运行环境。生产部署请设置 APP_ENV=production，用于启用启动期配置校验。
app:
  env: ${APP_ENV:development}

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: ${SERVER_PORT:8005}
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: ${REDIS_HOST:localhost}
    # 端口，默认为6379
    port: ${REDIS_PORT:6379}
    # 数据库索引
    database: ${REDIS_DATABASE:0}
    # 密码
    password: ${REDIS_PASSWORD:}
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: ${TOKEN_SECRET:local-dev-token-secret-change-before-production}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: ${SWAGGER_ENABLED:false}
  # 请求前缀
  pathMapping: /dev-api

# 若依演示接口开关，生产必须保持 false
demo:
  enabled: ${DEMO_ENABLED:false}

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 跨域配置，生产请设置为正式管理后台域名，多个域名用英文逗号分隔
cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:https://ht.diaoyuus.cn,https://www.diaoyuus.cn}

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 微信小程序配置
wx:
  miniapp:
    # 小程序 AppID（上线前务必改成真实 appid）
    appid: ${WX_APPID:wxc0bf4aba46ccdfe9}
    # 小程序 AppSecret
    secret: ${WX_SECRET:please-replace-me}
    # 是否允许 mock openid，仅限本地开发；生产环境会强制要求关闭
    mock-enabled: ${WX_MOCK_ENABLED:true}
    # 小程序登录 token 有效天数
    token-expire-days: ${WX_TOKEN_EXPIRE_DAYS:30}
    # code2session 地址
    code2session-url: https://api.weixin.qq.com/sns/jscode2session
  pay:
    # 是否启用真实微信支付；false 时使用 mock 通道方便本地联调
    enabled: ${WX_PAY_ENABLED:false}
    # 是否允许模拟支付成功，仅限本地开发
    mock-enabled: ${WX_PAY_MOCK_ENABLED:true}
    mch-id: ${WX_PAY_MCH_ID:}
    api-v3-key: ${WX_PAY_APIV3:}
    notify-url: ${WX_PAY_NOTIFY:https://example.com/app/order/pay/notify}
    # 商户证书私钥路径
    private-key-path: ${WX_PAY_PRIVATE_KEY:}
    # 证书序列号
    cert-serial: ${WX_PAY_CERT_SERIAL:}

# 和风天气（免费版即可，不配则返回 mock 数据）
weather:
  qweather:
    key: ${WEATHER_QWEATHER_KEY:}
    baseUrl: https://devapi.qweather.com
