name: Repair DB Password

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Rotate production DB password
        timeout-minutes: 10
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          : "${DB_USER:?Missing DB_USER secret}"
          : "${DB_PASSWORD:?Missing DB_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "NEW_DB_USER='${DB_USER}' NEW_DB_PASSWORD='${DB_PASSWORD}' bash -s" <<'EOF'
          set -euo pipefail

          DEPLOY_DIR="/www/wwwroot/dyjava"
          ENV_FILE="${DEPLOY_DIR}/.env.production"
          OLD_DB_USER=""
          OLD_DB_PASSWORD=""
          DB_NAME="diaoyu"
          DB_HOST="localhost"

          if [ -f "${ENV_FILE}" ]; then
            set -a
            # shellcheck disable=SC1090
            . "${ENV_FILE}"
            set +a
            OLD_DB_USER="${DB_USER:-}"
            OLD_DB_PASSWORD="${DB_PASSWORD:-}"
            DB_NAME="${DB_NAME:-diaoyu}"
            DB_HOST="${DB_HOST:-localhost}"
          fi

          TARGET_DB_USER="${NEW_DB_USER:-${OLD_DB_USER}}"
          TARGET_DB_PASSWORD="${NEW_DB_PASSWORD}"
          if [ -z "${TARGET_DB_USER}" ] || [ -z "${TARGET_DB_PASSWORD}" ]; then
            echo "DB user/password is empty."
            exit 1
          fi

          MYSQL_BIN="$(command -v mysql || true)"
          if [ -z "${MYSQL_BIN}" ] && [ -x /www/server/mysql/bin/mysql ]; then
            MYSQL_BIN=/www/server/mysql/bin/mysql
          fi
          if [ -z "${MYSQL_BIN}" ]; then
            echo "mysql command not found"
            exit 1
          fi

          sql_quote() {
            printf "%s" "$1" | sed "s/'/''/g"
          }

          mysql_with_creds() {
            local user="$1"
            local password="$2"
            shift 2
            if [ -n "${password}" ]; then
              MYSQL_PWD="${password}" "${MYSQL_BIN}" --default-character-set=utf8mb4 -u "${user}" "$@"
            else
              "${MYSQL_BIN}" --default-character-set=utf8mb4 -u "${user}" "$@"
            fi
          }

          find_bt_db_creds() {
            local py_bin
            py_bin="$(command -v python3 || command -v python || true)"
            if [ -z "${py_bin}" ] && [ -x /www/server/panel/pyenv/bin/python ]; then
              py_bin=/www/server/panel/pyenv/bin/python
            fi
            if [ ! -f /www/server/panel/data/default.db ] || [ -z "${py_bin}" ]; then
              return 0
            fi
            DB_NAME="${DB_NAME}" "${py_bin}" - <<'PY'
          import os
          import sqlite3

          db_name = os.environ.get("DB_NAME")
          db_path = "/www/server/panel/data/default.db"
          try:
              conn = sqlite3.connect(db_path)
              tables = [r[0] for r in conn.execute("select name from sqlite_master where type = 'table'")]
              for table in tables:
                  cols = [r[1] for r in conn.execute("pragma table_info(%s)" % table)]
                  if not {"username", "password"}.issubset(set(cols)):
                      continue
                  for name_col in [c for c in ("name", "db_name", "database") if c in cols]:
                      row = conn.execute(
                          "select username, password from %s where %s = ? limit 1" % (table, name_col),
                          (db_name,)
                      ).fetchone()
                      if row:
                          print((row[0] or "") + "\t" + (row[1] or ""))
                          raise SystemExit(0)
          except Exception:
              pass
          PY
          }

          find_admin_creds() {
            printf 'root\t\n'
            local py_bin
            py_bin="$(command -v python3 || command -v python || true)"
            if [ -z "${py_bin}" ] && [ -x /www/server/panel/pyenv/bin/python ]; then
              py_bin=/www/server/panel/pyenv/bin/python
            fi
            if [ -n "${py_bin}" ]; then
              "${py_bin}" - <<'PY'
          import configparser
          import json
          import os
          import re
          import sqlite3

          candidates = []

          for path in ("/www/server/panel/config/config.json",):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      data = json.load(f)
                  def walk(obj, prefix=""):
                      if isinstance(obj, dict):
                          for k, v in obj.items():
                              key = (prefix + "." + str(k)).lower()
                              if isinstance(v, (dict, list)):
                                  walk(v, key)
                              elif isinstance(v, str) and v and ("mysql" in key or "root" in key) and ("pwd" in key or "pass" in key):
                                  candidates.append(("root", v))
                      elif isinstance(obj, list):
                          for i, v in enumerate(obj):
                              walk(v, prefix + "." + str(i))
                  walk(data)
              except Exception:
                  pass

          db_path = "/www/server/panel/data/default.db"
          try:
              conn = sqlite3.connect(db_path)
              tables = [r[0] for r in conn.execute("select name from sqlite_master where type = 'table'")]
              for table in tables:
                  cols = [r[1] for r in conn.execute("pragma table_info(%s)" % table)]
                  lowered = {c.lower(): c for c in cols}
                  key_cols = [lowered[c] for c in ("name", "key", "k", "title") if c in lowered]
                  value_cols = [lowered[c] for c in ("value", "val", "v", "password", "pwd") if c in lowered]
                  for key_col in key_cols:
                      for value_col in value_cols:
                          try:
                              for key, value in conn.execute("select %s, %s from %s" % (key_col, value_col, table)):
                                  key = str(key or "").lower()
                                  value = str(value or "")
                                  if value and ("mysql" in key or "root" in key) and ("pwd" in key or "pass" in key or "root" in key):
                                      candidates.append(("root", value))
                          except Exception:
                              pass
          except Exception:
              pass

          for path in ("/root/.my.cnf", os.path.expanduser("~/.my.cnf")):
              try:
                  cp = configparser.ConfigParser()
                  cp.read(path)
                  for section in ("client", "mysql"):
                      if cp.has_section(section):
                          user = cp.get(section, "user", fallback="root")
                          password = cp.get(section, "password", fallback="")
                          candidates.append((user or "root", password or ""))
              except Exception:
                  pass

          seen = set()
          for user, password in candidates:
              item = (user, password)
              if item in seen:
                  continue
              seen.add(item)
              print((user or "root") + "\t" + (password or ""))
          PY
            fi
          }

          CANDIDATES=""
          if [ -n "${OLD_DB_USER}" ]; then
            CANDIDATES="${CANDIDATES}${OLD_DB_USER}	${OLD_DB_PASSWORD}
          "
          fi
          BT_DB_CREDS="$(find_bt_db_creds || true)"
          if [ -n "${BT_DB_CREDS}" ]; then
            CANDIDATES="${CANDIDATES}${BT_DB_CREDS}
          "
          fi

          SELECTED_USER=""
          SELECTED_PASSWORD=""
          while IFS="$(printf '\t')" read -r user password; do
            if [ -z "${user}" ]; then
              continue
            fi
            if mysql_with_creds "${user}" "${password}" "${DB_NAME}" -e "SELECT 1;" >/dev/null 2>&1; then
              SELECTED_USER="${user}"
              SELECTED_PASSWORD="${password}"
              break
            fi
          done <<CANDIDATE_EOF
          ${CANDIDATES}
          CANDIDATE_EOF

          if [ -z "${SELECTED_USER}" ]; then
            echo "Cannot connect to MySQL with existing app credentials; trying local admin credentials."
          else
            echo "Connected with existing app credentials."
          fi

          ADMIN_USER=""
          ADMIN_PASSWORD=""
          while IFS="$(printf '\t')" read -r user password; do
            if [ -z "${user}" ]; then
              continue
            fi
            if mysql_with_creds "${user}" "${password}" -e "SELECT 1;" >/dev/null 2>&1; then
              ADMIN_USER="${user}"
              ADMIN_PASSWORD="${password}"
              break
            fi
          done <<ADMIN_CANDIDATE_EOF
          $(find_admin_creds || true)
          ADMIN_CANDIDATE_EOF

          if [ -z "${SELECTED_USER}" ] && [ -z "${ADMIN_USER}" ]; then
            echo "Cannot connect to MySQL with app or local admin credentials."
            echo "Diagnostics without secret values:"
            echo "whoami=$(whoami)"
            id || true
            echo "mysql_bin=${MYSQL_BIN}"
            find /tmp /var/lib/mysql /www/server/mysql -maxdepth 2 -type s -name '*.sock' 2>/dev/null || true
            if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              echo "sudo_nopass=yes"
              if sudo "${MYSQL_BIN}" --default-character-set=utf8mb4 -u root -e "SELECT 1;" >/dev/null 2>&1; then
                echo "sudo_mysql_root=yes"
              else
                echo "sudo_mysql_root=no"
              fi
            else
              echo "sudo_nopass=no"
            fi
            if [ -f /www/server/panel/data/default.db ]; then
              echo "bt_default_db=present"
              py_bin="$(command -v python3 || command -v python || true)"
              if [ -z "${py_bin}" ] && [ -x /www/server/panel/pyenv/bin/python ]; then
                py_bin=/www/server/panel/pyenv/bin/python
              fi
              if [ -n "${py_bin}" ]; then
                DB_NAME="${DB_NAME}" "${py_bin}" - <<'PY'
          import os
          import sqlite3

          db_name = os.environ.get("DB_NAME")
          conn = sqlite3.connect("/www/server/panel/data/default.db")
          tables = [r[0] for r in conn.execute("select name from sqlite_master where type = 'table'")]
          print("bt_tables=" + ",".join(tables))
          for table in tables:
              try:
                  cols = [r[1] for r in conn.execute("pragma table_info(%s)" % table)]
                  print("bt_cols:%s=%s" % (table, ",".join(cols)))
                  lowered = {c.lower(): c for c in cols}
                  if {"username", "password"}.issubset(set(lowered.keys())):
                      for name_col in [lowered[c] for c in ("name", "db_name", "database") if c in lowered]:
                          count = conn.execute("select count(*) from %s where %s = ?" % (table, name_col), (db_name,)).fetchone()[0]
                          print("bt_db_match:%s.%s=%s" % (table, name_col, count))
                  for key_col_name in ("name", "key", "k", "title"):
                      key_col = lowered.get(key_col_name)
                      if not key_col:
                          continue
                      try:
                          rows = conn.execute("select %s from %s" % (key_col, table)).fetchall()
                      except Exception:
                          continue
                      interesting = []
                      for (key,) in rows:
                          key = str(key or "")
                          if any(part in key.lower() for part in ("mysql", "root", "password", "pwd")):
                              interesting.append(key)
                      if interesting:
                          print("bt_keys:%s.%s=%s" % (table, key_col, ",".join(interesting[:30])))
              except Exception as exc:
                  print("bt_table_error:%s=%s" % (table, type(exc).__name__))
          PY
              fi
            else
              echo "bt_default_db=missing"
            fi
            exit 1
          fi

          USER_SQL="$(sql_quote "${TARGET_DB_USER}")"
          PASS_SQL="$(sql_quote "${TARGET_DB_PASSWORD}")"
          DB_SQL="$(sql_quote "${DB_NAME}")"
          if [ -n "${ADMIN_USER}" ]; then
            echo "Rotating password with local admin credentials."
            HOSTS="$(mysql_with_creds "${ADMIN_USER}" "${ADMIN_PASSWORD}" -N -B -e "select Host from mysql.user where User='${USER_SQL}'" 2>/dev/null || true)"
            if [ -z "${HOSTS}" ]; then
              mysql_with_creds "${ADMIN_USER}" "${ADMIN_PASSWORD}" -e "CREATE USER IF NOT EXISTS '${USER_SQL}'@'localhost' IDENTIFIED BY '${PASS_SQL}'; GRANT ALL PRIVILEGES ON \`${DB_SQL}\`.* TO '${USER_SQL}'@'localhost'; FLUSH PRIVILEGES;" >/dev/null
            else
              while IFS= read -r host; do
                [ -n "${host}" ] || continue
                HOST_SQL="$(sql_quote "${host}")"
                mysql_with_creds "${ADMIN_USER}" "${ADMIN_PASSWORD}" -e "ALTER USER '${USER_SQL}'@'${HOST_SQL}' IDENTIFIED BY '${PASS_SQL}'; GRANT ALL PRIVILEGES ON \`${DB_SQL}\`.* TO '${USER_SQL}'@'${HOST_SQL}';" >/dev/null
              done <<HOST_EOF
          ${HOSTS}
          HOST_EOF
              mysql_with_creds "${ADMIN_USER}" "${ADMIN_PASSWORD}" -e "FLUSH PRIVILEGES;" >/dev/null
            fi
          else
            echo "Rotating password with current app user."
            if ! mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" -e "ALTER USER CURRENT_USER() IDENTIFIED BY '${PASS_SQL}';" >/dev/null 2>&1; then
              if ! mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" -e "SET PASSWORD = '${PASS_SQL}';" >/dev/null 2>&1; then
                mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" -e "ALTER USER '${USER_SQL}'@'localhost' IDENTIFIED BY '${PASS_SQL}';" >/dev/null
              fi
            fi
          fi

          mysql_with_creds "${TARGET_DB_USER}" "${TARGET_DB_PASSWORD}" "${DB_NAME}" -e "SELECT 1;" >/dev/null

          mkdir -p "${DEPLOY_DIR}"
          touch "${ENV_FILE}"
          chmod 600 "${ENV_FILE}" || true
          upsert_env() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" "${ENV_FILE}"; then
              tmp_file="$(mktemp)"
              awk -v k="${key}" -v v="${value}" 'BEGIN{done=0} $0 ~ "^" k "=" {print k "=" v; done=1; next} {print} END{if(!done) print k "=" v}' "${ENV_FILE}" > "${tmp_file}"
              cat "${tmp_file}" > "${ENV_FILE}"
              rm -f "${tmp_file}"
            else
              printf '%s=%s\n' "${key}" "${value}" >> "${ENV_FILE}"
            fi
          }

          upsert_env "DB_HOST" "${DB_HOST}"
          upsert_env "DB_NAME" "${DB_NAME}"
          upsert_env "DB_USER" "${TARGET_DB_USER}"
          upsert_env "DB_PASSWORD" "${TARGET_DB_PASSWORD}"

          echo "DB password repaired and verified for database ${DB_NAME}."
          EOF
