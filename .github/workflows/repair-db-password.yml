name: Repair DB Password

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Rotate production DB password
        timeout-minutes: 10
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          : "${DB_USER:?Missing DB_USER secret}"
          : "${DB_PASSWORD:?Missing DB_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "NEW_DB_USER='${DB_USER}' NEW_DB_PASSWORD='${DB_PASSWORD}' bash -s" <<'EOF'
          set -euo pipefail

          DEPLOY_DIR="/www/wwwroot/dyjava"
          ENV_FILE="${DEPLOY_DIR}/.env.production"
          OLD_DB_USER=""
          OLD_DB_PASSWORD=""
          DB_NAME="diaoyu"
          DB_HOST="localhost"

          if [ -f "${ENV_FILE}" ]; then
            set -a
            # shellcheck disable=SC1090
            . "${ENV_FILE}"
            set +a
            OLD_DB_USER="${DB_USER:-}"
            OLD_DB_PASSWORD="${DB_PASSWORD:-}"
            DB_NAME="${DB_NAME:-diaoyu}"
            DB_HOST="${DB_HOST:-localhost}"
          fi

          TARGET_DB_USER="${NEW_DB_USER:-${OLD_DB_USER}}"
          TARGET_DB_PASSWORD="${NEW_DB_PASSWORD}"
          if [ -z "${TARGET_DB_USER}" ] || [ -z "${TARGET_DB_PASSWORD}" ]; then
            echo "DB user/password is empty."
            exit 1
          fi

          MYSQL_BIN="$(command -v mysql || true)"
          if [ -z "${MYSQL_BIN}" ] && [ -x /www/server/mysql/bin/mysql ]; then
            MYSQL_BIN=/www/server/mysql/bin/mysql
          fi
          if [ -z "${MYSQL_BIN}" ]; then
            echo "mysql command not found"
            exit 1
          fi

          sql_quote() {
            printf "%s" "$1" | sed "s/'/''/g"
          }

          mysql_with_creds() {
            local user="$1"
            local password="$2"
            shift 2
            if [ -n "${password}" ]; then
              MYSQL_PWD="${password}" "${MYSQL_BIN}" --default-character-set=utf8mb4 -u "${user}" "$@"
            else
              "${MYSQL_BIN}" --default-character-set=utf8mb4 -u "${user}" "$@"
            fi
          }

          find_bt_db_creds() {
            local py_bin
            py_bin="$(command -v python3 || command -v python || true)"
            if [ -z "${py_bin}" ] && [ -x /www/server/panel/pyenv/bin/python ]; then
              py_bin=/www/server/panel/pyenv/bin/python
            fi
            if [ ! -f /www/server/panel/data/default.db ] || [ -z "${py_bin}" ]; then
              return 0
            fi
            DB_NAME="${DB_NAME}" "${py_bin}" - <<'PY'
          import os
          import sqlite3

          db_name = os.environ.get("DB_NAME")
          db_path = "/www/server/panel/data/default.db"
          try:
              conn = sqlite3.connect(db_path)
              tables = [r[0] for r in conn.execute("select name from sqlite_master where type = 'table'")]
              for table in tables:
                  cols = [r[1] for r in conn.execute("pragma table_info(%s)" % table)]
                  if not {"username", "password"}.issubset(set(cols)):
                      continue
                  for name_col in [c for c in ("name", "db_name", "database") if c in cols]:
                      row = conn.execute(
                          "select username, password from %s where %s = ? limit 1" % (table, name_col),
                          (db_name,)
                      ).fetchone()
                      if row:
                          print((row[0] or "") + "\t" + (row[1] or ""))
                          raise SystemExit(0)
          except Exception:
              pass
          PY
          }

          CANDIDATES=""
          if [ -n "${OLD_DB_USER}" ]; then
            CANDIDATES="${CANDIDATES}${OLD_DB_USER}	${OLD_DB_PASSWORD}
          "
          fi
          BT_DB_CREDS="$(find_bt_db_creds || true)"
          if [ -n "${BT_DB_CREDS}" ]; then
            CANDIDATES="${CANDIDATES}${BT_DB_CREDS}
          "
          fi

          SELECTED_USER=""
          SELECTED_PASSWORD=""
          while IFS="$(printf '\t')" read -r user password; do
            if [ -z "${user}" ]; then
              continue
            fi
            if mysql_with_creds "${user}" "${password}" "${DB_NAME}" -e "SELECT 1;" >/dev/null 2>&1; then
              SELECTED_USER="${user}"
              SELECTED_PASSWORD="${password}"
              break
            fi
          done <<CANDIDATE_EOF
          ${CANDIDATES}
          CANDIDATE_EOF

          if [ -z "${SELECTED_USER}" ]; then
            echo "Cannot connect to MySQL with existing app credentials."
            exit 1
          fi

          USER_SQL="$(sql_quote "${TARGET_DB_USER}")"
          PASS_SQL="$(sql_quote "${TARGET_DB_PASSWORD}")"
          if ! mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" -e "ALTER USER CURRENT_USER() IDENTIFIED BY '${PASS_SQL}';" >/dev/null 2>&1; then
            if ! mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" -e "SET PASSWORD = '${PASS_SQL}';" >/dev/null 2>&1; then
              mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" -e "ALTER USER '${USER_SQL}'@'localhost' IDENTIFIED BY '${PASS_SQL}';" >/dev/null
            fi
          fi

          mysql_with_creds "${TARGET_DB_USER}" "${TARGET_DB_PASSWORD}" "${DB_NAME}" -e "SELECT 1;" >/dev/null

          mkdir -p "${DEPLOY_DIR}"
          touch "${ENV_FILE}"
          chmod 600 "${ENV_FILE}" || true
          upsert_env() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" "${ENV_FILE}"; then
              tmp_file="$(mktemp)"
              awk -v k="${key}" -v v="${value}" 'BEGIN{done=0} $0 ~ "^" k "=" {print k "=" v; done=1; next} {print} END{if(!done) print k "=" v}' "${ENV_FILE}" > "${tmp_file}"
              cat "${tmp_file}" > "${ENV_FILE}"
              rm -f "${tmp_file}"
            else
              printf '%s=%s\n' "${key}" "${value}" >> "${ENV_FILE}"
            fi
          }

          upsert_env "DB_HOST" "${DB_HOST}"
          upsert_env "DB_NAME" "${DB_NAME}"
          upsert_env "DB_USER" "${TARGET_DB_USER}"
          upsert_env "DB_PASSWORD" "${TARGET_DB_PASSWORD}"

          echo "DB password repaired and verified for database ${DB_NAME}."
          EOF
