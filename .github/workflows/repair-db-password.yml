name: Repair DB Password

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package SQL
        run: tar -czf database-sql.tar.gz -C sql fishing-full.sql

      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload SQL
        timeout-minutes: 5
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -C"
          REMOTE_DIR="/tmp/shared-fishing-db-bootstrap"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${REMOTE_DIR}'"
          sshpass -p "${SSH_PASSWORD}" scp ${SSH_OPTS} -P "${SSH_PORT}" database-sql.tar.gz "${SSH_USER}@${SSH_HOST}:${REMOTE_DIR}/database-sql.tar.gz"

      - name: Bootstrap database and start backend
        timeout-minutes: 15
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          : "${DB_USER:?Missing DB_USER secret}"
          : "${DB_PASSWORD:?Missing DB_PASSWORD secret}"
          : "${MYSQL_ROOT_PASSWORD:?Missing MYSQL_ROOT_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SERVICE_NAME="${BACKEND_SERVICE:-fishing-backend}"
          DB_NAME="${DB_NAME:-ha}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "SERVICE_NAME='${SERVICE_NAME}' DB_NAME='${DB_NAME}' DB_USER='${DB_USER}' DB_PASSWORD='${DB_PASSWORD}' MYSQL_ROOT_PASSWORD='${MYSQL_ROOT_PASSWORD}' bash -s" <<'EOF'
          set -euo pipefail

          DEPLOY_DIR="/www/wwwroot/dyjava"
          ENV_FILE="${DEPLOY_DIR}/.env.production"
          REMOTE_DIR="/tmp/shared-fishing-db-bootstrap"
          SQL_FILE="${REMOTE_DIR}/fishing-full.sql"
          SERVER_PORT="8080"

          cd "${REMOTE_DIR}"
          tar -xzf database-sql.tar.gz

          MYSQL_BIN="$(command -v mysql || true)"
          if [ -z "${MYSQL_BIN}" ] && [ -x /www/server/mysql/bin/mysql ]; then
            MYSQL_BIN=/www/server/mysql/bin/mysql
          fi
          if [ -z "${MYSQL_BIN}" ]; then
            echo "mysql command not found"
            exit 1
          fi

          MYSQL_SOCKET="$(find /tmp /var/lib/mysql /www/server/mysql -maxdepth 2 -type s -name '*.sock' 2>/dev/null | head -n 1 || true)"
          MYSQL_SOCKET_OPT=""
          if [ -n "${MYSQL_SOCKET}" ]; then
            MYSQL_SOCKET_OPT="--socket=${MYSQL_SOCKET}"
          fi
          MYSQL_ROOT_EXTRA="${MYSQL_SOCKET_OPT}"

          mysql_with_password() {
            local user="$1"
            local password="$2"
            shift 2
            MYSQL_PWD="${password}" "${MYSQL_BIN}" --default-character-set=utf8mb4 ${MYSQL_SOCKET_OPT} -u "${user}" "$@"
          }

          mysql_root() {
            MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" "${MYSQL_BIN}" --default-character-set=utf8mb4 ${MYSQL_ROOT_EXTRA} -u root "$@"
          }

          mysql_app() {
            MYSQL_PWD="${DB_PASSWORD}" "${MYSQL_BIN}" --default-character-set=utf8mb4 -h 127.0.0.1 -P 3306 -u "${DB_USER}" "$@"
          }

          probe_root_connection() {
            for option in "${MYSQL_SOCKET_OPT}" "-h 127.0.0.1 -P 3306" "-h localhost --protocol=TCP -P 3306" ""; do
              MYSQL_ROOT_EXTRA="${option}"
              if mysql_root -e "SELECT 1;" >/dev/null 2>&1; then
                echo "MySQL root connection ok."
                return 0
              fi
            done
            return 1
          }

          sql_string() {
            printf "%s" "$1" | sed "s/'/''/g"
          }

          sql_ident() {
            printf "%s" "$1" | sed 's/`/``/g'
          }

          reset_root_with_bt() {
            if [ ! -f /www/server/panel/tools.py ]; then
              echo "BT panel tools.py not found."
              return 1
            fi
            local py_bin=""
            if command -v btpython >/dev/null 2>&1; then
              py_bin="$(command -v btpython)"
            elif [ -x /www/server/panel/pyenv/bin/python ]; then
              py_bin=/www/server/panel/pyenv/bin/python
            else
              py_bin="$(command -v python3 || command -v python || true)"
            fi
            if [ -z "${py_bin}" ]; then
              echo "Python runtime for BT panel not found."
              return 1
            fi
            cd /www/server/panel
            "${py_bin}" tools.py root "${MYSQL_ROOT_PASSWORD}" >/tmp/shared-fishing-bt-root-reset.log 2>&1
          }

          if ! probe_root_connection >/dev/null 2>&1; then
            echo "Resetting MySQL root password with BT panel tool."
            if ! reset_root_with_bt; then
              echo "BT panel root reset command failed."
              tail -n 80 /tmp/shared-fishing-bt-root-reset.log || true
              exit 1
            fi
          fi

          if ! probe_root_connection; then
            echo "Cannot connect to MySQL as root after password reset."
            echo "mysql_bin=${MYSQL_BIN}"
            echo "mysql_socket=${MYSQL_SOCKET:-none}"
            echo "BT reset output:"
            tail -n 80 /tmp/shared-fishing-bt-root-reset.log || true
            exit 1
          fi

          DB_SQL="$(sql_ident "${DB_NAME}")"
          USER_SQL="$(sql_string "${DB_USER}")"
          PASS_SQL="$(sql_string "${DB_PASSWORD}")"

          mysql_root -e "CREATE DATABASE IF NOT EXISTS \`${DB_SQL}\` DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          for host in localhost 127.0.0.1 '%'; do
            HOST_SQL="$(sql_string "${host}")"
            mysql_root -e "CREATE USER IF NOT EXISTS '${USER_SQL}'@'${HOST_SQL}' IDENTIFIED BY '${PASS_SQL}';" >/dev/null 2>&1 || true
            if ! mysql_root -e "ALTER USER '${USER_SQL}'@'${HOST_SQL}' IDENTIFIED BY '${PASS_SQL}';" >/dev/null 2>&1; then
              mysql_root -e "SET PASSWORD FOR '${USER_SQL}'@'${HOST_SQL}' = PASSWORD('${PASS_SQL}');" >/dev/null 2>&1 || true
            fi
            mysql_root -e "GRANT ALL PRIVILEGES ON \`${DB_SQL}\`.* TO '${USER_SQL}'@'${HOST_SQL}';" >/dev/null
          done
          mysql_root -e "FLUSH PRIVILEGES;"

          CORE_TABLES="$(mysql_root "${DB_NAME}" -N -B -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name IN ('sys_user','fish_venue');")"
          if [ "${CORE_TABLES}" -lt 2 ]; then
            echo "Importing initial SQL into ${DB_NAME}."
            mysql_root "${DB_NAME}" < "${SQL_FILE}"
          else
            echo "Core tables already exist in ${DB_NAME}; skipping destructive SQL import."
          fi

          mysql_app "${DB_NAME}" -e "SELECT 1;" >/dev/null

          mkdir -p "${DEPLOY_DIR}"
          touch "${ENV_FILE}"
          chmod 600 "${ENV_FILE}" || true
          upsert_env() {
            key="$1"
            value="$2"
            [ -n "${value}" ] || return 0
            if grep -q "^${key}=" "${ENV_FILE}"; then
              tmp_file="$(mktemp)"
              awk -v k="${key}" -v v="${value}" 'BEGIN{done=0} $0 ~ "^" k "=" {print k "=" v; done=1; next} {print} END{if(!done) print k "=" v}' "${ENV_FILE}" > "${tmp_file}"
              cat "${tmp_file}" > "${ENV_FILE}"
              rm -f "${tmp_file}"
            else
              printf '%s=%s\n' "${key}" "${value}" >> "${ENV_FILE}"
            fi
          }

          upsert_env "APP_ENV" "production"
          upsert_env "SERVER_PORT" "${SERVER_PORT}"
          upsert_env "DB_HOST" "localhost"
          upsert_env "DB_NAME" "${DB_NAME}"
          upsert_env "DB_USER" "${DB_USER}"
          upsert_env "DB_PASSWORD" "${DB_PASSWORD}"
          upsert_env "CORS_ALLOWED_ORIGINS" "https://ht.diaoyuus.cn,https://www.diaoyuus.cn"
          upsert_env "SWAGGER_ENABLED" "false"
          upsert_env "DEMO_ENABLED" "false"
          upsert_env "WX_MOCK_ENABLED" "false"
          upsert_env "WX_PAY_ENABLED" "true"
          upsert_env "WX_PAY_MOCK_ENABLED" "false"

          cd "${DEPLOY_DIR}"
          if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files "${SERVICE_NAME}.service" --no-legend | grep -q "${SERVICE_NAME}.service"; then
            systemctl restart "${SERVICE_NAME}.service"
            systemctl status "${SERVICE_NAME}.service" --no-pager -l
          elif [ -f ry.sh ]; then
            chmod +x ry.sh
            ./ry.sh restart
            ./ry.sh status || true
          else
            echo "No backend service or ry.sh found under ${DEPLOY_DIR}."
            exit 1
          fi

          sleep 15
          if ! curl -fsS --max-time 15 "http://127.0.0.1:${SERVER_PORT}/app/venue/default" >/tmp/fishing-health.json; then
            echo "Backend health check failed. Last application logs:"
            tail -n 200 "${DEPLOY_DIR}/logs/dy.jar.log" || true
            exit 1
          fi
          echo "Backend health check passed:"
          head -c 500 /tmp/fishing-health.json
          echo
          EOF
