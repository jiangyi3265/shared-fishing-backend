name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  DEPLOY_DIR: /www/wwwroot/dyjava
  JAR_NAME: dy.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - name: Build
        run: mvn -B -DskipTests clean package

      - name: Package artifact
        run: |
          mkdir -p deploy
          cp "ruoyi-admin/target/${JAR_NAME}" "deploy/${JAR_NAME}"
          ls -lh "deploy/${JAR_NAME}"

      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Upload artifact
        timeout-minutes: 25
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SSH_CMD="ssh ${SSH_OPTS} -p ${SSH_PORT}"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_DIR}'"
          if sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "command -v rsync >/dev/null 2>&1"; then
            sshpass -p "${SSH_PASSWORD}" rsync -av --partial --delay-updates --info=progress2,stats2 -e "${SSH_CMD}" "deploy/${JAR_NAME}" "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/${JAR_NAME}"
          else
            echo "Remote rsync not found, falling back to scp."
            sshpass -p "${SSH_PASSWORD}" scp ${SSH_OPTS} -P "${SSH_PORT}" "deploy/${JAR_NAME}" "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/${JAR_NAME}.upload"
          fi

      - name: Deploy and restart service
        timeout-minutes: 5
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SERVICE_NAME="${BACKEND_SERVICE:-fishing-backend}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "DEPLOY_DIR='${DEPLOY_DIR}' JAR_NAME='${JAR_NAME}' SERVICE_NAME='${SERVICE_NAME}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${DEPLOY_DIR}"
          if [ -f "${JAR_NAME}.upload" ]; then
            mv "${JAR_NAME}.upload" "${JAR_NAME}"
          fi
          ls -lh "${JAR_NAME}"

          if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files "${SERVICE_NAME}.service" --no-legend | grep -q "${SERVICE_NAME}.service"; then
            systemctl restart "${SERVICE_NAME}.service"
            systemctl status "${SERVICE_NAME}.service" --no-pager -l
          else
            echo "Jar uploaded to ${DEPLOY_DIR}/dy.jar."
            echo "Systemd service ${SERVICE_NAME}.service was not found. Restart the backend manually or add BACKEND_SERVICE secret."
          fi
          EOF
