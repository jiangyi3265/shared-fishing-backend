name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  DEPLOY_DIR: /www/wwwroot/dyjava
  SOURCE_ROOT: /www/wwwroot/dyjava-source
  JAR_NAME: dy.jar
  SOURCE_ARCHIVE: backend-source.tar.gz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source
        run: |
          set -euo pipefail
          SOURCE_ARCHIVE_PATH="/tmp/${SOURCE_ARCHIVE}"
          rm -f "${SOURCE_ARCHIVE_PATH}" "${SOURCE_ARCHIVE}"
          tar \
            --exclude='.git' \
            --exclude='*/target' \
            --exclude='*/target/*' \
            --exclude='*.log' \
            -czf "${SOURCE_ARCHIVE_PATH}" .
          mv "${SOURCE_ARCHIVE_PATH}" "${SOURCE_ARCHIVE}"
          ls -lh "${SOURCE_ARCHIVE}"

      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload source and deploy
        timeout-minutes: 45
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          SSH_PORT="${SSH_PORT:-22}"

          if [ -z "${SSH_PRIVATE_KEY:-}" ] && [ -z "${SSH_PASSWORD:-}" ]; then
            echo "Set either SSH_PRIVATE_KEY or SSH_PASSWORD in GitHub Actions secrets."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh_cmd=(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -p "${SSH_PORT}")
          scp_cmd=(scp -O -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -P "${SSH_PORT}")

          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh_cmd+=(-i ~/.ssh/deploy_key)
            scp_cmd+=(-i ~/.ssh/deploy_key)
          fi

          remote="${SSH_USER}@${SSH_HOST}"

          remote_ssh() {
            if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
              "${ssh_cmd[@]}" "${remote}" "$@"
            else
              sshpass -p "${SSH_PASSWORD}" "${ssh_cmd[@]}" "${remote}" "$@"
            fi
          }

          remote_scp() {
            if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
              "${scp_cmd[@]}" "$1" "${remote}:$2"
            else
              sshpass -p "${SSH_PASSWORD}" "${scp_cmd[@]}" "$1" "${remote}:$2"
            fi
          }

          remote_ssh "mkdir -p '${DEPLOY_DIR}' '${SOURCE_ROOT}'"
          remote_scp "${SOURCE_ARCHIVE}" "${DEPLOY_DIR}/${SOURCE_ARCHIVE}"

          if [ -n "${BACKEND_ENV:-}" ]; then
            printf '%s\n' "${BACKEND_ENV}" > .backend_env
            remote_scp .backend_env "${DEPLOY_DIR}/.backend_env"
          else
            remote_ssh "rm -f '${DEPLOY_DIR}/.backend_env'"
          fi

          printf '%s' "${BACKEND_SERVICE:-}" > .backend_service
          printf '%s' "${BACKEND_HEALTH_URL:-}" > .backend_health_url
          remote_scp .backend_service "${DEPLOY_DIR}/.backend_service"
          remote_scp .backend_health_url "${DEPLOY_DIR}/.backend_health_url"

          remote_ssh "bash -s" -- "${DEPLOY_DIR}" "${SOURCE_ROOT}" "${JAR_NAME}" "${SOURCE_ARCHIVE}" "${GITHUB_SHA}" <<'EOF'
          set -euo pipefail

          DEPLOY_DIR="$1"
          SOURCE_ROOT="$2"
          JAR_NAME="$3"
          SOURCE_ARCHIVE="$4"
          COMMIT_SHA="$5"
          RELEASE_DIR="${SOURCE_ROOT}/${COMMIT_SHA}"
          SERVICE_NAME="$(cat "${DEPLOY_DIR}/.backend_service" 2>/dev/null || true)"
          HEALTH_URL="$(cat "${DEPLOY_DIR}/.backend_health_url" 2>/dev/null || true)"
          BACKUP_SUFFIX="$(date +%Y%m%d%H%M%S)"

          case "${RELEASE_DIR}" in
            "${SOURCE_ROOT}"/*) ;;
            *) echo "Invalid release directory: ${RELEASE_DIR}"; exit 1 ;;
          esac

          rm -rf "${RELEASE_DIR}"
          mkdir -p "${DEPLOY_DIR}" "${SOURCE_ROOT}" "${RELEASE_DIR}"
          tar -xzf "${DEPLOY_DIR}/${SOURCE_ARCHIVE}" -C "${RELEASE_DIR}"
          rm -f "${DEPLOY_DIR}/${SOURCE_ARCHIVE}"

          if [ -s "${DEPLOY_DIR}/.backend_env" ]; then
            install -m 600 "${DEPLOY_DIR}/.backend_env" "${DEPLOY_DIR}/.env.production"
          elif [ ! -f "${DEPLOY_DIR}/.env.production" ]; then
            echo "Warning: ${DEPLOY_DIR}/.env.production does not exist. Add BACKEND_ENV secret or create it on the server."
          fi
          rm -f "${DEPLOY_DIR}/.backend_env"

          cd "${RELEASE_DIR}"
          mvn -B -DskipTests clean package
          test -f "ruoyi-admin/target/${JAR_NAME}"

          if [ -f "${DEPLOY_DIR}/${JAR_NAME}" ]; then
            cp "${DEPLOY_DIR}/${JAR_NAME}" "${DEPLOY_DIR}/${JAR_NAME}.${BACKUP_SUFFIX}.bak"
          fi

          install -m 644 "ruoyi-admin/target/${JAR_NAME}" "${DEPLOY_DIR}/${JAR_NAME}"
          install -m 755 ry.sh "${DEPLOY_DIR}/ry.sh"
          rm -f "${DEPLOY_DIR}/.backend_service" "${DEPLOY_DIR}/.backend_health_url"

          cd "${DEPLOY_DIR}"

          run_systemctl() {
            if [ "$(id -u)" -eq 0 ]; then
              systemctl "$@"
            else
              sudo -n systemctl "$@"
            fi
          }

          if [ -n "${SERVICE_NAME}" ] && command -v systemctl >/dev/null 2>&1 && run_systemctl list-unit-files "${SERVICE_NAME}.service" --no-legend | grep -q "${SERVICE_NAME}.service"; then
            run_systemctl restart "${SERVICE_NAME}.service"
            run_systemctl status "${SERVICE_NAME}.service" --no-pager -l || true
          else
            if [ -n "${SERVICE_NAME}" ]; then
              echo "Systemd service ${SERVICE_NAME}.service was not found or cannot be controlled; falling back to ry.sh."
            fi
            ./ry.sh restart
            ./ry.sh status
          fi

          if [ -z "${HEALTH_URL}" ]; then
            SERVER_PORT=""
            if [ -f .env.production ]; then
              SERVER_PORT="$(grep -E '^SERVER_PORT=' .env.production | tail -n 1 | cut -d= -f2- | tr -d '"' | tr -d "'" | tr -d '[:space:]' || true)"
            fi
            HEALTH_URL="http://127.0.0.1:${SERVER_PORT:-8080}/app/venue/default"
          fi

          if command -v curl >/dev/null 2>&1; then
            for i in $(seq 1 20); do
              if curl -fsS --max-time 5 "${HEALTH_URL}" >/tmp/fishing-health.json; then
                echo "Backend health check passed: ${HEALTH_URL}"
                head -c 500 /tmp/fishing-health.json || true
                echo
                exit 0
              fi
              sleep 3
            done

            echo "Backend health check failed: ${HEALTH_URL}"
            tail -n 200 "${DEPLOY_DIR}/logs/${JAR_NAME}.log" 2>/dev/null || true
            if [ -n "${SERVICE_NAME}" ] && command -v journalctl >/dev/null 2>&1; then
              journalctl -u "${SERVICE_NAME}.service" -n 100 --no-pager 2>/dev/null || true
            fi
            exit 1
          fi

          echo "curl is not installed on the server; skipped HTTP health check."
          EOF
