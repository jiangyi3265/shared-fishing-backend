name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  DEPLOY_DIR: /www/wwwroot/dyjava
  SOURCE_ROOT: /www/wwwroot/dyjava-source
  JAR_NAME: dy.jar
  SOURCE_ARCHIVE: backend-source.tar.gz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - name: Build
        run: mvn -B -DskipTests clean package

      - name: Package source
        run: |
          SOURCE_ARCHIVE_PATH="/tmp/${SOURCE_ARCHIVE}"
          rm -f "${SOURCE_ARCHIVE_PATH}"
          tar \
            --exclude='.git' \
            --exclude='*/target' \
            --exclude='*/target/*' \
            -czf "${SOURCE_ARCHIVE_PATH}" .
          mv "${SOURCE_ARCHIVE_PATH}" "${SOURCE_ARCHIVE}"
          ls -lh "${SOURCE_ARCHIVE}"

      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload source
        timeout-minutes: 10
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SSH_OPTS="-C -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_DIR}'"
          sshpass -p "${SSH_PASSWORD}" scp ${SSH_OPTS} -P "${SSH_PORT}" "${SOURCE_ARCHIVE}" "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/${SOURCE_ARCHIVE}"

      - name: Build on server and restart
        timeout-minutes: 45
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_SECRET: ${{ secrets.WX_SECRET }}
          WX_PAY_MCH_ID: ${{ secrets.WX_PAY_MCH_ID }}
          WX_PAY_APIV3: ${{ secrets.WX_PAY_APIV3 }}
          WX_PAY_NOTIFY: ${{ secrets.WX_PAY_NOTIFY }}
          WX_PAY_CERT_SERIAL: ${{ secrets.WX_PAY_CERT_SERIAL }}
          WX_PAY_PRIVATE_KEY_B64: ${{ secrets.WX_PAY_PRIVATE_KEY_B64 }}
          WX_PAY_PUBLIC_KEY_ID: ${{ secrets.WX_PAY_PUBLIC_KEY_ID }}
          WX_PAY_PUBLIC_KEY_B64: ${{ secrets.WX_PAY_PUBLIC_KEY_B64 }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SERVICE_NAME="${BACKEND_SERVICE:-fishing-backend}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "DEPLOY_DIR='${DEPLOY_DIR}' SOURCE_ROOT='${SOURCE_ROOT}' JAR_NAME='${JAR_NAME}' SOURCE_ARCHIVE='${SOURCE_ARCHIVE}' COMMIT_SHA='${GITHUB_SHA}' SERVICE_NAME='${SERVICE_NAME}' DB_NAME='${DB_NAME:-}' DB_USER='${DB_USER:-}' DB_PASSWORD='${DB_PASSWORD:-}' TOKEN_SECRET='${TOKEN_SECRET:-}' WX_APPID='${WX_APPID:-}' WX_SECRET='${WX_SECRET:-}' WX_PAY_MCH_ID='${WX_PAY_MCH_ID:-}' WX_PAY_APIV3='${WX_PAY_APIV3:-}' WX_PAY_NOTIFY='${WX_PAY_NOTIFY:-}' WX_PAY_CERT_SERIAL='${WX_PAY_CERT_SERIAL:-}' WX_PAY_PRIVATE_KEY_B64='${WX_PAY_PRIVATE_KEY_B64:-}' WX_PAY_PUBLIC_KEY_ID='${WX_PAY_PUBLIC_KEY_ID:-}' WX_PAY_PUBLIC_KEY_B64='${WX_PAY_PUBLIC_KEY_B64:-}' bash -s" <<'EOF'
          set -euo pipefail
          RELEASE_DIR="${SOURCE_ROOT}/${COMMIT_SHA}"
          case "${RELEASE_DIR}" in
            "${SOURCE_ROOT}"/*) ;;
            *) echo "Invalid release directory: ${RELEASE_DIR}"; exit 1 ;;
          esac

          mkdir -p "${DEPLOY_DIR}" "${SOURCE_ROOT}"
          rm -rf "${RELEASE_DIR}"
          mkdir -p "${RELEASE_DIR}"
          tar -xzf "${DEPLOY_DIR}/${SOURCE_ARCHIVE}" -C "${RELEASE_DIR}"
          rm -f "${DEPLOY_DIR}/${SOURCE_ARCHIVE}"

          if ! command -v mvn >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update
              apt-get install -y maven
            elif command -v yum >/dev/null 2>&1; then
              yum install -y maven
            else
              echo "mvn command not found and no supported package manager is available."
              exit 1
            fi
          fi

          ENV_FILE="${DEPLOY_DIR}/.env.production"
          CERT_DIR="/opt/fishing/certs"
          PRIVATE_KEY_PATH="${CERT_DIR}/apiclient_key.pem"
          PUBLIC_KEY_PATH="${CERT_DIR}/wechatpay_public_key.pem"
          touch "${ENV_FILE}"
          chmod 600 "${ENV_FILE}" || true

          upsert_env() {
            key="$1"
            value="$2"
            [ -n "${value}" ] || return 0
            if grep -q "^${key}=" "${ENV_FILE}"; then
              tmp_file="$(mktemp)"
              awk -v k="${key}" -v v="${value}" 'BEGIN{done=0} $0 ~ "^" k "=" {print k "=" v; done=1; next} {print} END{if(!done) print k "=" v}' "${ENV_FILE}" > "${tmp_file}"
              cat "${tmp_file}" > "${ENV_FILE}"
              rm -f "${tmp_file}"
            else
              printf '%s=%s\n' "${key}" "${value}" >> "${ENV_FILE}"
            fi
          }

          mkdir -p "${CERT_DIR}"
          if [ -n "${WX_PAY_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "${WX_PAY_PRIVATE_KEY_B64}" | base64 -d > "${PRIVATE_KEY_PATH}"
            chmod 600 "${PRIVATE_KEY_PATH}"
          fi
          if [ -n "${WX_PAY_PUBLIC_KEY_B64:-}" ]; then
            : "${WX_PAY_PUBLIC_KEY_ID:?Missing WX_PAY_PUBLIC_KEY_ID secret}"
            printf '%s' "${WX_PAY_PUBLIC_KEY_B64}" | base64 -d > "${PUBLIC_KEY_PATH}"
            chmod 600 "${PUBLIC_KEY_PATH}"
          fi

          upsert_env "WX_PAY_ENABLED" "true"
          upsert_env "WX_PAY_MOCK_ENABLED" "false"
          upsert_env "WX_PAY_MCH_ID" "${WX_PAY_MCH_ID:-}"
          upsert_env "WX_PAY_APIV3" "${WX_PAY_APIV3:-}"
          upsert_env "WX_PAY_NOTIFY" "${WX_PAY_NOTIFY:-}"
          upsert_env "WX_PAY_PRIVATE_KEY" "${PRIVATE_KEY_PATH}"
          upsert_env "WX_PAY_CERT_SERIAL" "${WX_PAY_CERT_SERIAL:-}"
          if [ -n "${WX_PAY_PUBLIC_KEY_ID:-}" ] || [ -n "${WX_PAY_PUBLIC_KEY_B64:-}" ]; then
            upsert_env "WX_PAY_PUBLIC_KEY" "${PUBLIC_KEY_PATH}"
            upsert_env "WX_PAY_PUBLIC_KEY_ID" "${WX_PAY_PUBLIC_KEY_ID:-}"
          fi
          upsert_env "APP_ENV" "production"
          upsert_env "SERVER_PORT" "8080"
          upsert_env "DB_HOST" "localhost"
          upsert_env "DB_NAME" "${DB_NAME:-ha}"
          upsert_env "DB_USER" "${DB_USER:-}"
          upsert_env "DB_PASSWORD" "${DB_PASSWORD:-}"
          upsert_env "TOKEN_SECRET" "${TOKEN_SECRET:-}"
          upsert_env "CORS_ALLOWED_ORIGINS" "https://ht.diaoyuus.cn,https://www.diaoyuus.cn"
          upsert_env "SWAGGER_ENABLED" "false"
          upsert_env "DEMO_ENABLED" "false"
          upsert_env "WX_MOCK_ENABLED" "false"
          upsert_env "WX_APPID" "${WX_APPID:-}"
          upsert_env "WX_SECRET" "${WX_SECRET:-}"

          cd "${RELEASE_DIR}"
          mvn -B -DskipTests clean package
          cp "ruoyi-admin/target/${JAR_NAME}" "${DEPLOY_DIR}/${JAR_NAME}"
          if [ -f ry.sh ]; then
            cp ry.sh "${DEPLOY_DIR}/ry.sh"
          fi
          cd "${DEPLOY_DIR}"
          ls -lh "${JAR_NAME}"

          if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files "${SERVICE_NAME}.service" --no-legend | grep -q "${SERVICE_NAME}.service"; then
            systemctl restart "${SERVICE_NAME}.service"
            systemctl status "${SERVICE_NAME}.service" --no-pager -l
          elif [ -f ry.sh ]; then
            chmod +x ry.sh
            ./ry.sh restart
            ./ry.sh status
          else
            echo "Jar uploaded to ${DEPLOY_DIR}/dy.jar."
            echo "Systemd service ${SERVICE_NAME}.service and ry.sh were not found. Restart the backend manually or add BACKEND_SERVICE secret."
          fi

          sleep 15
          if [ -f ry.sh ]; then
            ./ry.sh status
          fi
          if ! curl -fsS --max-time 15 "http://127.0.0.1:${SERVER_PORT:-8080}/app/venue/default" >/tmp/fishing-health.json; then
            echo "Backend health check failed. Last application logs:"
            tail -n 200 "${DEPLOY_DIR}/logs/${JAR_NAME}.log" || true
            exit 1
          fi
          MYSQL_BIN="$(command -v mysql || true)"
          if [ -z "${MYSQL_BIN}" ] && [ -x /www/server/mysql/bin/mysql ]; then
            MYSQL_BIN=/www/server/mysql/bin/mysql
          fi
          if [ -n "${MYSQL_BIN}" ] && [ -n "${DB_USER:-}" ] && [ -n "${DB_PASSWORD:-}" ]; then
            MYSQL_PWD="${DB_PASSWORD}" "${MYSQL_BIN}" --default-character-set=utf8mb4 -h 127.0.0.1 -P 3306 -u "${DB_USER}" "${DB_NAME:-ha}" -e "
              INSERT INTO fish_qrcode (venue_id, qr_type, scene_value, remark, status, create_by, create_time)
              SELECT 1, 'start', 'action=start&venueId=1', '默认入场码', '0', 'admin', NOW()
              WHERE NOT EXISTS (SELECT 1 FROM fish_qrcode WHERE venue_id = 1 AND qr_type = 'start');
              INSERT INTO fish_qrcode (venue_id, qr_type, scene_value, remark, status, create_by, create_time)
              SELECT 1, 'end', 'action=end&venueId=1', '默认离场码', '0', 'admin', NOW()
              WHERE NOT EXISTS (SELECT 1 FROM fish_qrcode WHERE venue_id = 1 AND qr_type = 'end');
            "
          fi
          echo "Backend health check passed:"
          head -c 500 /tmp/fishing-health.json
          echo

          PY_BIN="$(command -v python3 || command -v python || true)"
          if [ -n "${PY_BIN}" ]; then
            SERVER_PORT="${SERVER_PORT:-8080}" "${PY_BIN}" - <<'PY'
          import os
          import re
          from pathlib import Path

          server_port = os.environ.get("SERVER_PORT", "8080")
          roots = [
              Path("/www/server/panel/vhost/nginx"),
              Path("/www/server/nginx/conf/vhost"),
              Path("/etc/nginx/conf.d"),
              Path("/www/server/nginx/conf"),
          ]
          pattern = re.compile(r"(proxy_pass\s+http://(?:127\.0\.0\.1|localhost):)(\d+)(/?)\s*;", re.I)
          changed = []
          seen = set()
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob("*.conf"):
                  if path in seen:
                      continue
                  seen.add(path)
                  try:
                      text = path.read_text(encoding="utf-8")
                  except UnicodeDecodeError:
                      text = path.read_text(encoding="latin-1")
                  if "prod-api" not in text:
                      continue
                  updated = pattern.sub(lambda m: m.group(1) + server_port + m.group(3) + ";", text)
                  if updated != text:
                      path.write_text(updated, encoding="utf-8")
                      changed.append(str(path))
                  else:
                      print("nginx_prod_api_found=" + str(path))
          if changed:
              print("nginx_proxy_updated=" + ",".join(changed))
          PY
          fi

          if command -v nginx >/dev/null 2>&1; then
            nginx -t
            nginx -s reload
          elif [ -x /www/server/nginx/sbin/nginx ]; then
            /www/server/nginx/sbin/nginx -t
            /www/server/nginx/sbin/nginx -s reload
          elif command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files nginx.service --no-legend | grep -q nginx.service; then
            systemctl reload nginx.service
          fi
          EOF
