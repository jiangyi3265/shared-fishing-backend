name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  DEPLOY_DIR: /www/wwwroot/dyjava
  SOURCE_ROOT: /www/wwwroot/dyjava-source
  JAR_NAME: dy.jar
  SOURCE_ARCHIVE: backend-source.tar.gz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source
        run: |
          set -euo pipefail
          SOURCE_ARCHIVE_PATH="/tmp/${SOURCE_ARCHIVE}"
          rm -f "${SOURCE_ARCHIVE_PATH}" "${SOURCE_ARCHIVE}"
          tar \
            --exclude='.git' \
            --exclude='*/target' \
            --exclude='*/target/*' \
            --exclude='*.log' \
            -czf "${SOURCE_ARCHIVE_PATH}" .
          mv "${SOURCE_ARCHIVE_PATH}" "${SOURCE_ARCHIVE}"
          ls -lh "${SOURCE_ARCHIVE}"

      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload source and deploy
        timeout-minutes: 45
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
          BACKEND_PUBLIC_HEALTH_URL: ${{ secrets.BACKEND_PUBLIC_HEALTH_URL }}
          EXTRA_REQUIRED_SERVICES: ${{ secrets.EXTRA_REQUIRED_SERVICES }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          SSH_PORT="${SSH_PORT:-22}"

          if [ -z "${SSH_PRIVATE_KEY:-}" ] && [ -z "${SSH_PASSWORD:-}" ]; then
            echo "Set either SSH_PRIVATE_KEY or SSH_PASSWORD in GitHub Actions secrets."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh_cmd=(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -p "${SSH_PORT}")
          scp_cmd=(scp -O -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -P "${SSH_PORT}")

          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh_cmd+=(-i ~/.ssh/deploy_key)
            scp_cmd+=(-i ~/.ssh/deploy_key)
          fi

          remote="${SSH_USER}@${SSH_HOST}"

          remote_ssh() {
            if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
              "${ssh_cmd[@]}" "${remote}" "$@"
            else
              sshpass -p "${SSH_PASSWORD}" "${ssh_cmd[@]}" "${remote}" "$@"
            fi
          }

          remote_scp() {
            if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
              "${scp_cmd[@]}" "$1" "${remote}:$2"
            else
              sshpass -p "${SSH_PASSWORD}" "${scp_cmd[@]}" "$1" "${remote}:$2"
            fi
          }

          remote_ssh "mkdir -p '${DEPLOY_DIR}' '${SOURCE_ROOT}'"
          remote_scp "${SOURCE_ARCHIVE}" "${DEPLOY_DIR}/${SOURCE_ARCHIVE}"

          if [ -n "${BACKEND_ENV:-}" ]; then
            printf '%s\n' "${BACKEND_ENV}" > .backend_env
            remote_scp .backend_env "${DEPLOY_DIR}/.backend_env"
          else
            remote_ssh "rm -f '${DEPLOY_DIR}/.backend_env'"
          fi

          printf '%s' "${BACKEND_SERVICE:-}" > .backend_service
          printf '%s' "${BACKEND_HEALTH_URL:-}" > .backend_health_url
          printf '%s' "${BACKEND_PUBLIC_HEALTH_URL:-}" > .backend_public_health_url
          printf '%s' "${EXTRA_REQUIRED_SERVICES:-}" > .extra_required_services
          remote_scp .backend_service "${DEPLOY_DIR}/.backend_service"
          remote_scp .backend_health_url "${DEPLOY_DIR}/.backend_health_url"
          remote_scp .backend_public_health_url "${DEPLOY_DIR}/.backend_public_health_url"
          remote_scp .extra_required_services "${DEPLOY_DIR}/.extra_required_services"

          remote_ssh "bash -s" -- "${DEPLOY_DIR}" "${SOURCE_ROOT}" "${JAR_NAME}" "${SOURCE_ARCHIVE}" "${GITHUB_SHA}" <<'EOF'
          set -Eeuo pipefail

          DEPLOY_DIR="$1"
          SOURCE_ROOT="$2"
          JAR_NAME="$3"
          SOURCE_ARCHIVE="$4"
          COMMIT_SHA="$5"
          RELEASE_DIR="${SOURCE_ROOT}/${COMMIT_SHA}"
          SERVICE_NAME="$(cat "${DEPLOY_DIR}/.backend_service" 2>/dev/null || true)"
          HEALTH_URL="$(cat "${DEPLOY_DIR}/.backend_health_url" 2>/dev/null || true)"
          PUBLIC_HEALTH_URL="$(cat "${DEPLOY_DIR}/.backend_public_health_url" 2>/dev/null || true)"
          EXTRA_REQUIRED_SERVICES="$(cat "${DEPLOY_DIR}/.extra_required_services" 2>/dev/null || true)"
          BACKUP_SUFFIX="$(date +%Y%m%d%H%M%S)"

          case "${RELEASE_DIR}" in
            "${SOURCE_ROOT}"/*) ;;
            *) echo "Invalid release directory: ${RELEASE_DIR}"; exit 1 ;;
          esac

          rm -rf "${RELEASE_DIR}"
          mkdir -p "${DEPLOY_DIR}" "${SOURCE_ROOT}" "${RELEASE_DIR}"
          tar -xzf "${DEPLOY_DIR}/${SOURCE_ARCHIVE}" -C "${RELEASE_DIR}"
          rm -f "${DEPLOY_DIR}/${SOURCE_ARCHIVE}"

          if [ -s "${DEPLOY_DIR}/.backend_env" ]; then
            sed -i 's/\r$//' "${DEPLOY_DIR}/.backend_env"
            install -m 600 "${DEPLOY_DIR}/.backend_env" "${DEPLOY_DIR}/.env.production"
          elif [ ! -f "${DEPLOY_DIR}/.env.production" ]; then
            echo "Warning: ${DEPLOY_DIR}/.env.production does not exist. Add BACKEND_ENV secret or create it on the server."
          fi
          rm -f "${DEPLOY_DIR}/.backend_env"

          cd "${RELEASE_DIR}"
          mvn -B clean package
          test -f "ruoyi-admin/target/${JAR_NAME}"

          MIGRATION_FILE="${RELEASE_DIR}/sql/migration-2026-07-12-app-bugfixes.sql"
          ENV_FILE="${DEPLOY_DIR}/.env.production"
          if [ ! -f "${MIGRATION_FILE}" ]; then
            echo "Database migration file is missing: ${MIGRATION_FILE}"
            exit 1
          fi
          if [ ! -f "${ENV_FILE}" ]; then
            echo "Database migration requires ${ENV_FILE} with DB_HOST, DB_PORT, DB_NAME, DB_USER and DB_PASSWORD."
            exit 1
          fi

          read_env_value() {
            local key="$1"
            local value
            value="$(sed -n "s/^${key}=//p" "${ENV_FILE}" | tail -n 1)"
            case "${value}" in
              \"*\") value="${value#\"}"; value="${value%\"}" ;;
              \'*\') value="${value#\'}"; value="${value%\'}" ;;
            esac
            printf '%s' "${value}"
          }

          DB_HOST="$(read_env_value DB_HOST)"
          DB_PORT="$(read_env_value DB_PORT)"
          DB_NAME="$(read_env_value DB_NAME)"
          DB_USER="$(read_env_value DB_USER)"
          DB_PASSWORD="$(read_env_value DB_PASSWORD)"
          DB_HOST="${DB_HOST:-127.0.0.1}"
          DB_PORT="${DB_PORT:-3306}"

          if [ -z "${DB_NAME}" ] || [ -z "${DB_USER}" ] || [ -z "${DB_PASSWORD}" ]; then
            echo "Database migration requires non-empty DB_NAME, DB_USER and DB_PASSWORD in ${ENV_FILE}."
            exit 1
          fi

          MYSQL_CLIENT="$(command -v mysql || command -v mariadb || true)"
          if [ -z "${MYSQL_CLIENT}" ]; then
            echo "Database migration cannot run: install mysql-client or mariadb-client on the server."
            exit 1
          fi

          echo "Applying idempotent database migration before replacing the running jar."
          MYSQL_PWD="${DB_PASSWORD}" "${MYSQL_CLIENT}" \
            --protocol=TCP \
            --host="${DB_HOST}" \
            --port="${DB_PORT}" \
            --user="${DB_USER}" \
            --default-character-set=utf8mb4 \
            "${DB_NAME}" < "${MIGRATION_FILE}"
          unset DB_PASSWORD MYSQL_PWD
          echo "Database migration completed."

          run_systemctl() {
            if [ "$(id -u)" -eq 0 ]; then
              systemctl "$@"
            else
              sudo -n systemctl "$@"
            fi
          }

          unit_exists() {
            local svc="$1"
            systemctl list-unit-files "${svc}.service" --no-legend 2>/dev/null | grep -q "${svc}.service" \
              || systemctl status "${svc}.service" >/dev/null 2>&1
          }

          assert_unit_active() {
            local svc="$1"
            run_systemctl is-active --quiet "${svc}.service"
            echo "Service ${svc}.service is active."
          }

          report_one_service_status() {
            local label="$1"
            shift
            local svc=""
            for candidate in "$@"; do
              if unit_exists "${candidate}"; then
                svc="${candidate}"
                break
              fi
            done
            if [ -z "${svc}" ]; then
              echo "Warning: no ${label} systemd unit found among: $*"
              return 0
            fi
            if run_systemctl is-active --quiet "${svc}.service"; then
              echo "Service ${svc}.service is active."
            else
              echo "Warning: ${label} unit ${svc}.service exists but is not systemd-active. Continuing; HTTP health checks remain authoritative."
            fi
          }

          backend_uses_systemd() {
            [ -n "${SERVICE_NAME}" ] \
              && command -v systemctl >/dev/null 2>&1 \
              && unit_exists "${SERVICE_NAME}"
          }

          restart_backend() {
            cd "${DEPLOY_DIR}"
            if backend_uses_systemd; then
              if ! run_systemctl restart "${SERVICE_NAME}.service"; then
                echo "Failed to restart ${SERVICE_NAME}.service."
                return 1
              fi
              if ! run_systemctl is-active --quiet "${SERVICE_NAME}.service"; then
                echo "Service ${SERVICE_NAME}.service is not active after restart."
                run_systemctl status "${SERVICE_NAME}.service" --no-pager -l || true
                return 1
              fi
              run_systemctl status "${SERVICE_NAME}.service" --no-pager -l || true
            else
              if [ -n "${SERVICE_NAME}" ]; then
                echo "Systemd service ${SERVICE_NAME}.service was not found or cannot be controlled; falling back to ry.sh."
              fi
              if ! ./ry.sh restart; then
                echo "ry.sh failed to restart the backend."
                return 1
              fi
            fi
            return 0
          }

          stop_backend() {
            cd "${DEPLOY_DIR}"
            if backend_uses_systemd; then
              run_systemctl stop "${SERVICE_NAME}.service"
            elif [ -x ./ry.sh ]; then
              ./ry.sh stop
            fi
          }

          report_required_services() {
            if command -v systemctl >/dev/null 2>&1; then
              report_one_service_status "Nginx" nginx
              report_one_service_status "Redis" redis redis-server
              report_one_service_status "MySQL" mysql mysqld mariadb

              for svc in ${EXTRA_REQUIRED_SERVICES:-}; do
                assert_unit_active "${svc}"
              done
            else
              echo "systemctl is not available; skipped system service checks."
            fi
          }

          if [ -z "${HEALTH_URL}" ]; then
            SERVER_PORT="$(read_env_value SERVER_PORT)"
            HEALTH_URL="http://127.0.0.1:${SERVER_PORT:-8080}/app/venue/default"
          fi
          PUBLIC_HEALTH_URL="${PUBLIC_HEALTH_URL:-https://www.diaoyuus.cn/app/venue/default}"

          response_has_error() {
            grep -Eiq '"code"[[:space:]]*:[[:space:]]*(4[0-9]{2}|5[0-9]{2})|### Error|Exception|SQLException|SQLSyntaxErrorException' "$1"
          }

          wait_for_health() {
            local url="$1"
            local label="$2"
            local timeout_seconds="$3"
            local attempts="$4"
            local output_file="$5"
            local i

            rm -f "${output_file}"
            for i in $(seq 1 "${attempts}"); do
              if curl -fsS --max-time "${timeout_seconds}" "${url}" >"${output_file}"; then
                if response_has_error "${output_file}"; then
                  echo "${label} returned an error payload (attempt ${i}/${attempts}): ${url}"
                  head -c 1000 "${output_file}" || true
                  echo
                else
                  echo "${label} passed: ${url}"
                  head -c 500 "${output_file}" || true
                  echo
                  return 0
                fi
              else
                echo "${label} request failed (attempt ${i}/${attempts}): ${url}"
              fi
              if [ "${i}" -lt "${attempts}" ]; then sleep 3; fi
            done

            echo "${label} failed after ${attempts} attempts: ${url}"
            return 1
          }

          if ! command -v curl >/dev/null 2>&1; then
            echo "Deployment health checks require curl on the server."
            exit 1
          fi

          CURRENT_JAR="${DEPLOY_DIR}/${JAR_NAME}"
          ROLLBACK_JAR="${DEPLOY_DIR}/${JAR_NAME}.rollback"
          FAILURE_LOG="${DEPLOY_DIR}/failed-deploy-${COMMIT_SHA}.log"
          ROLLBACK_AVAILABLE=0
          DEPLOY_ACTIVE=0

          rollback_on_exit() {
            local status=$?
            local restart_status=1
            trap - EXIT HUP INT TERM
            if [ "${DEPLOY_ACTIVE}" -ne 1 ] || [ "${status}" -eq 0 ]; then
              exit "${status}"
            fi

            set +e
            {
              echo "Failed deployment commit: ${COMMIT_SHA}"
              echo "Failure time: $(date -Is)"
              echo "Backend log tail before rollback:"
              tail -n 200 "${DEPLOY_DIR}/logs/${JAR_NAME}.log" 2>/dev/null || true
              if [ -n "${SERVICE_NAME}" ] && command -v journalctl >/dev/null 2>&1; then
                echo "Systemd journal before rollback:"
                journalctl -u "${SERVICE_NAME}.service" -n 100 --no-pager 2>/dev/null || true
              fi
            } >"${FAILURE_LOG}" 2>&1
            cat "${FAILURE_LOG}" || true

            if [ "${ROLLBACK_AVAILABLE}" -eq 1 ] && [ -f "${ROLLBACK_JAR}" ]; then
              echo "Restoring previous jar from ${ROLLBACK_JAR}."
              if install -m 644 "${ROLLBACK_JAR}" "${CURRENT_JAR}"; then
                restart_backend
                restart_status=$?
              else
                echo "Failed to restore the rollback jar."
                restart_status=1
              fi
              if [ "${restart_status}" -eq 0 ]; then
                wait_for_health "${HEALTH_URL}" "Rollback backend health check" 5 10 /tmp/fishing-rollback-health.json
                restart_status=$?
              fi
              if [ "${restart_status}" -eq 0 ]; then
                echo "Rollback completed and the previous backend is healthy."
              else
                echo "Rollback jar was restored, but restarting or validating the previous backend failed."
              fi
            else
              echo "No previous jar exists; removing the failed new jar and stopping the backend."
              rm -f "${CURRENT_JAR}"
              stop_backend || true
            fi
            echo "Failed deployment diagnostics were saved to ${FAILURE_LOG}."
            exit "${status}"
          }

          rm -f "${ROLLBACK_JAR}"
          if [ -f "${CURRENT_JAR}" ]; then
            install -m 644 "${CURRENT_JAR}" "${ROLLBACK_JAR}"
            cp "${CURRENT_JAR}" "${CURRENT_JAR}.${BACKUP_SUFFIX}.bak"
            ROLLBACK_AVAILABLE=1
          fi

          rm -f \
            "${DEPLOY_DIR}/.backend_service" \
            "${DEPLOY_DIR}/.backend_health_url" \
            "${DEPLOY_DIR}/.backend_public_health_url" \
            "${DEPLOY_DIR}/.extra_required_services"

          trap rollback_on_exit EXIT
          trap 'exit 130' HUP INT TERM
          DEPLOY_ACTIVE=1

          install -m 755 "${RELEASE_DIR}/ry.sh" "${DEPLOY_DIR}/ry.sh"
          install -m 644 "${RELEASE_DIR}/ruoyi-admin/target/${JAR_NAME}" "${CURRENT_JAR}"
          restart_backend
          report_required_services

          if ! wait_for_health "${HEALTH_URL}" "Backend internal health check" 5 20 /tmp/fishing-health.json; then
            tail -n 200 "${DEPLOY_DIR}/logs/${JAR_NAME}.log" 2>/dev/null || true
            if [ -n "${SERVICE_NAME}" ] && command -v journalctl >/dev/null 2>&1; then
              journalctl -u "${SERVICE_NAME}.service" -n 100 --no-pager 2>/dev/null || true
            fi
            false
          fi

          wait_for_health "${PUBLIC_HEALTH_URL}" "Backend public health check" 8 20 /tmp/fishing-public-health.json

          DEPLOY_ACTIVE=0
          trap - EXIT HUP INT TERM
          echo "Backend deployment completed successfully. Rollback jar retained at ${ROLLBACK_JAR}."
          EOF
