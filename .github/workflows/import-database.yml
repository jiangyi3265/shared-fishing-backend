name: Import Database

on:
  workflow_dispatch:
    inputs:
      database:
        description: MySQL database name
        required: true
        default: diaoyu

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package SQL
        run: tar -czf database-sql.tar.gz -C sql ry_20250522.sql fishing.sql

      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload SQL
        timeout-minutes: 5
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -C"
          REMOTE_DIR="/tmp/shared-fishing-db-import"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${REMOTE_DIR}'"
          sshpass -p "${SSH_PASSWORD}" scp ${SSH_OPTS} -P "${SSH_PORT}" database-sql.tar.gz "${SSH_USER}@${SSH_HOST}:${REMOTE_DIR}/database-sql.tar.gz"

      - name: Import SQL
        timeout-minutes: 5
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DB_NAME: ${{ inputs.database }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          SSH_PORT="${SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -C"
          DB_USER="${DB_USER:-}"
          DB_PASSWORD="${DB_PASSWORD:-}"

          sshpass -p "${SSH_PASSWORD}" ssh ${SSH_OPTS} -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "DB_NAME='${DB_NAME}' DB_USER='${DB_USER}' DB_PASSWORD='${DB_PASSWORD}' bash -s" <<'EOF'
          set -euo pipefail

          REMOTE_DIR="/tmp/shared-fishing-db-import"
          cd "${REMOTE_DIR}"
          tar -xzf database-sql.tar.gz

          MYSQL_BIN="$(command -v mysql || true)"
          if [ -z "${MYSQL_BIN}" ] && [ -x /www/server/mysql/bin/mysql ]; then
            MYSQL_BIN=/www/server/mysql/bin/mysql
          fi
          if [ -z "${MYSQL_BIN}" ]; then
            echo "mysql command not found"
            exit 1
          fi

          CANDIDATES=""
          if [ -n "${DB_USER}" ]; then
            CANDIDATES="${CANDIDATES}${DB_USER}	${DB_PASSWORD}
          "
          fi
          PY_BIN="$(command -v python3 || command -v python || true)"
          if [ -z "${PY_BIN}" ] && [ -x /www/server/panel/pyenv/bin/python ]; then
            PY_BIN=/www/server/panel/pyenv/bin/python
          fi

          if [ -f /www/server/panel/data/default.db ] && [ -n "${PY_BIN}" ]; then
            BT_DB_CREDS="$("${PY_BIN}" - <<'PY'
          import os
          import sqlite3

          db_name = os.environ.get("DB_NAME")
          db_path = "/www/server/panel/data/default.db"

          try:
              conn = sqlite3.connect(db_path)
              tables = [r[0] for r in conn.execute("select name from sqlite_master where type = 'table'")]
              for table in tables:
                  cols = [r[1] for r in conn.execute("pragma table_info(%s)" % table)]
                  if not {"username", "password"}.issubset(set(cols)):
                      continue
                  name_cols = [c for c in ("name", "db_name", "database") if c in cols]
                  for name_col in name_cols:
                      sql = "select username, password from %s where %s = ? limit 1" % (table, name_col)
                      row = conn.execute(sql, (db_name,)).fetchone()
                      if row:
                          print((row[0] or "") + "\t" + (row[1] or ""))
                          raise SystemExit(0)
          except Exception:
              pass
          PY
          )"
            if [ -n "${BT_DB_CREDS}" ]; then
              echo "BT panel database credentials found for ${DB_NAME}."
              CANDIDATES="${CANDIDATES}${BT_DB_CREDS}
          "
            else
              echo "BT panel database credentials not found for ${DB_NAME}."
            fi
          else
            echo "BT panel database metadata or Python runtime not found."
          fi

          mysql_with_creds() {
            local user="$1"
            local password="$2"
            shift 2
            if [ -n "${password}" ]; then
              MYSQL_PWD="${password}" "${MYSQL_BIN}" --default-character-set=utf8mb4 -u "${user}" "$@"
            else
              "${MYSQL_BIN}" --default-character-set=utf8mb4 -u "${user}" "$@"
            fi
          }

          SELECTED_USER=""
          SELECTED_PASSWORD=""
          while IFS="$(printf '\t')" read -r user password; do
            if [ -z "${user}" ]; then
              continue
            fi
            if mysql_with_creds "${user}" "${password}" "${DB_NAME}" -e "SELECT 1;" >/dev/null 2>&1; then
              SELECTED_USER="${user}"
              SELECTED_PASSWORD="${password}"
              break
            fi
          done <<CANDIDATE_EOF
          ${CANDIDATES}
          CANDIDATE_EOF

          if [ -z "${SELECTED_USER}" ]; then
            echo "Cannot connect to MySQL database ${DB_NAME}. Set DB_USER and DB_PASSWORD secrets if needed."
            exit 1
          fi

          echo "Using MySQL user ${SELECTED_USER} for database ${DB_NAME}."
          mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" "${DB_NAME}" < ry_20250522.sql
          mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" "${DB_NAME}" < fishing.sql
          mysql_with_creds "${SELECTED_USER}" "${SELECTED_PASSWORD}" "${DB_NAME}" -e "SELECT DATABASE() AS db_name; SELECT COUNT(*) AS fish_table_count FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name LIKE 'fish_%'; SELECT COUNT(*) AS sys_table_count FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name LIKE 'sys_%';"
          EOF
